<h1>Список категорій</h1>

<a href="{% url 'category_create' %}">
    Створити категорію
</a>

<hr>

{% for category in categories %}
    <div>
        <h3>{{ category.name }}</h3>

        <p>{{ category.description }}</p>

        <p>{{ category.slug }}</p>
    </div>

    <hr>
{% empty %}
    <p>Категорій поки немає.</p>
{% endfor %}
