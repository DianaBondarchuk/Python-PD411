{% extends "layout.html" %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-900 px-4">
    <div class="w-full max-w-md rounded-2xl bg-gray-800 p-8 shadow-xl">

        <h1 class="text-3xl font-bold text-center text-white mb-8">
            Реєстрація на сайті
        </h1>

        <form class="space-y-5">

            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">
                    Ім'я
                </label>
                <input
                    type="text"
                    placeholder="Введіть ім'я"
                    class="w-full rounded-lg border border-gray-700 bg-gray-900 px-4 py-3 text-white placeholder-gray-500 focus:border-indigo-500 focus:outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">
                    Email
                </label>
                <input
                    type="email"
                    placeholder="example@gmail.com"
                    class="w-full rounded-lg border border-gray-700 bg-gray-900 px-4 py-3 text-white placeholder-gray-500 focus:border-indigo-500 focus:outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">
                    Пароль
                </label>
                <input
                    type="password"
                    placeholder="••••••••"
                    class="w-full rounded-lg border border-gray-700 bg-gray-900 px-4 py-3 text-white placeholder-gray-500 focus:border-indigo-500 focus:outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">
                    Підтвердження пароля
                </label>
                <input
                    type="password"
                    placeholder="••••••••"
                    class="w-full rounded-lg border border-gray-700 bg-gray-900 px-4 py-3 text-white placeholder-gray-500 focus:border-indigo-500 focus:outline-none">
            </div>

            <button
                type="submit"
                class="w-full rounded-lg bg-indigo-600 py-3 font-semibold text-white transition hover:bg-indigo-500">
                Зареєструватися
            </button>

        </form>

        <p class="mt-6 text-center text-sm text-gray-400">
            Вже маєте акаунт?
            <a href="#" class="font-semibold text-indigo-400 hover:text-indigo-300">
                Увійти
            </a>
        </p>

    </div>
</div>


{% endblock %}
